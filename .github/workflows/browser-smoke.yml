name: Browser smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Fuldt URL til et deployet preview eller production"
        required: true
        type: string
      run_authenticated:
        description: "Kør også login og cykelregistrering mod testkontoen"
        required: false
        default: false
        type: boolean

jobs:
  public-browser-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run public browser journeys
        env:
          PLAYWRIGHT_BASE_URL: ${{ inputs.base_url }}
        run: pnpm test:e2e

      - name: Run authenticated browser journey
        if: ${{ inputs.run_authenticated }}
        env:
          PLAYWRIGHT_BASE_URL: ${{ inputs.base_url }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
        run: |
          test -n "$E2E_USER_EMAIL"
          test -n "$E2E_USER_PASSWORD"
          pnpm exec playwright test e2e/authenticated.spec.ts
